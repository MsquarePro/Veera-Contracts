<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Header</title>
    <style>
        :root {
            --brand-blue: #22618B;
            --brand-cyan: #72bdd0;
            --brand-cream: #fef6eb;
            --brand-dark: #050505;
        }

        /* The header is fixed over the hero, then becomes readable against page content on scroll. */
        .site-header {
            position: fixed;
            inset: 0 0 auto;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(0, 0, 0, .62), rgba(0, 0, 0, 0));
            border-bottom: 1px solid transparent;
            transition: background .25s ease, border-color .25s ease, backdrop-filter .25s ease;
        }

        .site-header.is-scrolled {
            background: rgba(5, 5, 5, .92);
            border-bottom-color: rgba(255, 255, 255, .1);
            backdrop-filter: blur(12px);
        }

        .site-header__inner{
    width:min(1120px, calc(100% - 2rem));
    min-height:72px;
    margin:auto;
    display:flex;
    align-items:center;
    position:relative;
}

.site-brand{
    display:flex;
    align-items:center;
    gap:12px;
    text-decoration:none;
    z-index:2;
}
        .site-brand span {
            color: var(--brand-cyan);
        }

        .site-nav{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
}
/* LOGO */
.brand-logo{
    width:40px;
    height:40px;
    object-fit:contain;
    display:block;
    flex-shrink:0;
}
/* TEXT */
.brand-text{
    display:flex;
    flex-direction:column;
    line-height:1;
}

.brand-text strong{
    color:#fff;
    font-size:20px;
    font-weight:700;
}

.brand-text small{
    color:var(--brand-cyan);
    font-size:10px;
    letter-spacing:2px;
}
        /* NAVIGATION */
        .site-nav a {
            color: #d6d6d6;
            padding: .65rem .85rem;
            border-radius: .35rem;
            font-size: .8rem;
            font-weight: 700;
            letter-spacing: .11em;
            text-decoration: none;
            text-transform: uppercase;
            transition: background .2s, color .2s;
        }

        .site-nav a:hover,
        .site-nav a[aria-current="page"] {
            color: var(--brand-dark);
            background: var(--brand-cyan);
        }
        /* MOBILE */
        @media (max-width: 480px) {
            .site-header__inner {
                min-height: 62px;
                width: min(100% - 1.25rem, 1120px);
            }

            .site-brand {
                font-size: .8rem;
                letter-spacing: .07em;
            }

            .site-nav {
                gap: 0;
            }

            .site-nav a {
                padding: .55rem .42rem;
                font-size: .65rem;
                letter-spacing: .04em;
            }
        }
    </style>
</head>

<body>
    <header class="site-header">
        <div class="site-header__inner">
            <a class="site-brand" href="index.html" aria-label="Veera Contracts home">
                <img src="Media/veeralogo.jpeg" alt="Veera Contracts Logo" class="brand-logo">
            
                <span class="brand-text">
                    <strong>VEERA</strong>
                    <small>CONTRACTS</small>
                </span>
            </a>
            <nav class="site-nav" aria-label="Primary navigation">
                <a href="index.html">Home</a>
                <a href="SERVICES.html">Services</a>
                <a href="ABOUT.html">About</a>
                <a href="CONTACT.html">Contact Us </a>
            </nav>
        </div>
    </header>
</body>

</html>
