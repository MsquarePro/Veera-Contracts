<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT US</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Antonio:wght@700&family=Montserrat:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* BRAND COLORS */
        :root {
            --brand-blue: #22618B;
            --brand-cyan: #72bdd0;
            --brand-cream: #fef6eb;
            --brand-dark: #050505;
        }

        /* LENIS SCROLL FIXES */
        html.lenis,
        html.lenis body {
            height: auto;
        }

        .lenis.lenis-smooth {
            scroll-behavior: auto !important;
        }

        .lenis.lenis-smooth [data-lenis-prevent] {
            overscroll-behavior: contain;
        }

        .lenis.lenis-stopped {
            overflow: hidden;
        }

        .lenis.lenis-scrolling iframe {
            pointer-events: none;
        }

        body {
            background-color: var(--brand-dark);
            color: var(--brand-cream);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* TYPOGRAPHY */
        h1,
        h2,
        h3,
        h4 {

            text-transform: uppercase;
        }

        /* HERO STYLES */
        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 120%;
            object-fit: cover;
            opacity: 0.4;
            filter: grayscale(80%) contrast(1.2);
            z-index: 0;
        }

        .hero-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(5, 5, 5, 0.2) 0%, rgba(5, 5, 5, 1) 100%);
            z-index: 1;
        }


        /* CONTACT SECTION */

        .contact-wrapper {

            width: min(1200px, 92%);

            margin: 10px auto 100px;

            display: grid;

            grid-template-columns: 1.1fr .9fr;

            gap: 35px;

        }

        /* FORM */

        .contact-form {

            background: #111;

            border: 1px solid #222;

            padding: 35px;

            border-radius: 12px;

            position: relative;

        }

        .paper-plane {

            position: absolute;

            right: 25px;

            top: 25px;

            font-size: 70px;

            color: #1c1c1c;

        }

        .contact-form h2 {



            font-size: 55px;

            margin-bottom: 8px;

        }

        .contact-form p {

            color: #999;

            margin-bottom: 30px;

        }

        .contact-form input,
        .contact-form textarea {

            width: 100%;

            background: #1d1d1d;

            border: 1px solid #333;

            padding: 15px;

            color: white;

            margin-bottom: 18px;

            border-radius: 6px;

            font-size: 15px;

        }

        .contact-form textarea {

            height: 160px;

            resize: none;

        }

        .two-col {

            display: grid;

            grid-template-columns: 1fr 1fr;

            gap: 15px;

        }

        .contact-form button {

            width: 100%;

            padding: 16px;

            background: #2f79aa;

            border: none;

            color: white;

            font-weight: 700;

            font-size: 15px;

            letter-spacing: 2px;

            cursor: pointer;

            border-radius: 6px;

            transition: .3s;

        }

        .contact-form button:hover {

            background: #3f96d0;

        }

        /* RIGHT */

        .info-row {

            display: grid;

            grid-template-columns: 1fr 1fr;

            gap: 20px;

            margin-bottom: 20px;

        }

        .info-card {

            background: #111;

            border: 1px solid #222;

            padding: 30px;

            border-radius: 12px;

        }

        .icon {

            width: 50px;

            height: 50px;

            background: #0d2534;

            border-radius: 50%;

            display: flex;

            justify-content: center;

            align-items: center;

            color: #6cc6ec;

            margin-bottom: 18px;

        }

        .info-card h3 {



            font-size: 34px;

            margin-bottom: 10px;

        }

        .info-card p {

            color: #b8b8b8;

        }

        /* MAP */

        .map iframe {

            width: 100%;

            height: 320px;

            border: none;

            border-radius: 12px;

        }

        /* RESPONSIVE */

        @media(max-width:900px) {

            .contact-wrapper {

                grid-template-columns: 1fr;

            }

            .two-col {

                grid-template-columns: 1fr;

            }

            .info-row {

                grid-template-columns: 1fr;

            }

        }
    </style>
</head>

<body class="antialiased">
    <div id="site-header"></div>

    <header class="relative min-h-screen flex flex-col justify-center items-center text-center px-6 overflow-hidden">
        <img src="Media\pic3.jpeg"
            class="hero-bg" id="heroBg" alt="Commercial HVAC Services">
        <div class="hero-gradient"></div>

        <div class="relative z-10 max-w-5xl mt-20">
            <span class="text-[#72bdd0] text-sm font-bold tracking-[0.3em] uppercase block mb-6 hero-anim">Get in Touch</span>
            <h1 class="text-6xl md:text-9xl text-white mb-6 hero-anim leading-none font-['Antonio'] uppercase">
                Contact <span class="text-transparent bg-clip-text bg-gradient-to-r from-[#22618B] to-[#72bdd0]"
                    style="font-family: 'Antonio', sans-serif !important;">US</span>
            </h1>
            <p class="text-lg md:text-2xl text-gray-300 font-light max-w-3xl mx-auto leading-relaxed hero-anim">
                "Ready to discuss your commercial HVAC project?
                Our engineering team is here to answer your questions and
                provide expert consultation."
            </p>
        </div>
    </header>

    <section class="contact-wrapper">

        <div class="contact-form">

            <div class="paper-plane">
                <i class="fa-solid fa-paper-plane"></i>
            </div>

            <h2>SEND A MESSAGE</h2>

            <p>
                Fill out the form below and our team will contact you shortly.
            </p>

            <form>

                <input type="text" placeholder="Full Name">

                <div class="two-col">

                    <input type="text" placeholder="Phone Number">

                    <input type="email" placeholder="Email Address">

                </div>

                <textarea placeholder="How can we help you?"></textarea>

                <button>SUBMIT MESSAGE</button>

            </form>

        </div>

        <div class="contact-right">

            <div class="info-row">

                <div class="info-card">

                    <div class="icon">

                        <i class="fa-solid fa-phone"></i>

                    </div>

                    <h3>CALL US</h3>

                    <p>+91 9876543210</p>

                </div>

                <div class="info-card">

                    <div class="icon">

                        <i class="fa-solid fa-envelope"></i>

                    </div>

                    <h3>EMAIL</h3>

                    <p>info@veeracontracts.com</p>

                </div>

            </div>

            <div class="map">

                <iframe src="https://www.google.com/maps?q=Gurugram,Haryana&output=embed" loading="lazy">
                </iframe>

            </div>

        </div>

    </section>

    <script>
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            smooth: true
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        gsap.registerPlugin(ScrollTrigger);

        // Hero Image Parallax
        gsap.to("#heroBg", {
            yPercent: 20,
            ease: "none",
            scrollTrigger: {
                trigger: "header",
                start: "top top",
                end: "bottom top",
                scrub: true
            }
        });

        // Hero Text Animation
        const tl = gsap.timeline({
            defaults: {
                ease: "power3.out"
            }
        });

        tl.from(".hero-anim", {
            y: 30,
            opacity: 0,
            duration: 1,
            stagger: 0.15,
            delay: 0.2
        });
    </script>

    <div id="site-footer"></div>
    <script src="shared-layout.js"></script>
</body>

</html>
