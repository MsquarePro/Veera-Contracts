<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Footer</title>

    <style>
        .site-footer {
            background: #050505;
            color: #fef6eb;
            padding: 60px 30px 25px;
            border-top: 1px solid rgba(255, 255, 255, .1);
            font-family: 'Montserrat', Arial, sans-serif;
        }

        .site-footer__inner {
            max-width: 1200px;
            margin: auto;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 50px;
            align-items: start;
        }

        /* Company */

        .footer-company img {
            width: 85px;
            margin-bottom: 15px;
        }

        .footer-company h3 {
            margin: 0;
            font-size: 28px;
            color: #fff;
            letter-spacing: 2px;
            font-family: 'Antonio', sans-serif;
        }

        /* Address */

        .footer-address h4,
        .footer-links h4 {
            color: #72bdd0;
            margin-bottom: 18px;
            font-size: 18px;
        }

        .footer-address p {
            color: #d5d5d5;
            line-height: 1.8;
            margin: 0;
        }

        /* Links */

        .footer-links nav {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .footer-links a {
            text-decoration: none;
            color: #fef6eb;
            transition: .3s;
            font-weight: 500;
        }

        .footer-links a:hover,
        .footer-links a[aria-current="page"] {
            color: #72bdd0;
            padding-left: 6px;
        }

        /* Divider */

        .footer-divider {
            max-width: 1200px;
            margin: 45px auto 20px;
            border-top: 1px solid rgba(255, 255, 255, .2);
        }

        /* Bottom */

        .footer-bottom {
            max-width: 1200px;
            margin: auto;
            text-align: center;
        }

        .footer-bottom p {
            margin: 6px 0;
            color: #bfbfbf;
            font-size: 14px;
            line-height: 1.8;
        }

        @media(max-width:900px) {

            .site-footer__inner {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .footer-links nav {
                align-items: center;
            }

        }
    </style>

</head>

<body>

    <footer class="site-footer">

        <div class="site-footer__inner">

            <!-- Company -->

            <div class="footer-company">

                <img src="Media/veeralogo.jpeg" alt="Veera Contracts Logo">

                <h3>VEERA CONTRACTS</h3>

            </div>

            <!-- Address -->

            <div class="footer-address">

                <p>
                    Industrial Machinery Manufacturing<br>
                    Gurugram, Haryana
                </p>

            </div>

            <!-- Navigation -->

            <div class="footer-links">

    <h4>Legal</h4>

    <nav aria-label="Footer navigation">

        <a href="#">Privacy Policy</a>

        <a href="#">Terms of Service</a>

    </nav>

</div>

        </div>

        <div class="footer-divider"></div>

        <div class="footer-bottom">

            <p>
                &copy;
                <span class="site-footer-year"></span>
                VEERA CONTRACTS. All Rights Reserved.
            </p>

            <p>
                Engineered to deliver ultimate structural HVAC optimization across commercial spaces.
            </p>

        </div>

    </footer>

</body>

</html>
